notes:
  - "Grid is 7×7"
  - "Heroes are 160×200, rendered before board for natural depth layering"
  - "Reference games: Puzzle Quest for match-3 + RPG hybrid, Gems of War for mana system"
  - "UI is split into 6 separate entities for modularity"
  - "Screen flow: Title → Dungeon Selection → Game Board → Victory/Defeat → Dungeon Selection"
  - "Cross-entity communication uses LocalEvents (entity-scoped UiEvents don't cross boundaries)"
  - "All 15 heroes now have unique battle sprites matching their class identity"
  - "Heroes face RIGHT toward enemies (enemies face LEFT toward heroes)"
